<html>
<head>
  <title>Emotion Music Recommendation</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0-beta3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #f4f6fb;
      --card: #eef1f7;
      --light: #ffffff;
      --dark: #d6dbea;
      --text: #5a5f73;
      --accent: #8ea6ff;
      --radius: 14px;
    }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
      text-align: center;
      margin: 20px 0;
      color: var(--accent);
    }

    h2 {
      font-size: 20px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 15px;
    }

    .container-box {
      display: flex;
      gap: 20px;
      padding: 20px;
    }

    .card-soft {
      flex: 1;
      background: var(--card);
      border-radius: var(--radius);
      box-shadow: 6px 6px 12px var(--dark),
                  -6px -6px 12px var(--light);
      padding: 20px;
      text-align: center;
    }

    img {
      width: 100%;
      border-radius: var(--radius);
      box-shadow: 4px 4px 10px var(--dark),
                  -4px -4px 10px var(--light);
    }

    table {
      border-radius: var(--radius);
      overflow: hidden;
      font-size: 14px;
    }

    th, td {
      text-align: center;
      padding: 8px;
    }

    thead {
      background: var(--accent);
      color: white;
    }

    tbody tr {
      background: var(--card);
    }
  </style>
</head>

<body>

  <h1>Mood Music Recommender</h1>

  <div class="container-box">

    <!-- LEFT -->
    <div class="card-soft">
      <h2>Emotion Detector</h2>
      <img src="{{ url_for('video_feed') }}" />
    </div>

    <!-- RIGHT -->
    <div class="card-soft">
      <h2>Song Recommendations</h2>
      <div id="ResultArea"></div>
    </div>

  </div>

</body>

<script src="//ajax.googleapis.com/ajax/libs/jquery/1.9.1/jquery.min.js"></script>
<script>

setInterval(function() {
    $.getJSON('/t', function(data) {
        CreateHtmlTable(data);
    });
}, 500);

function CreateHtmlTable(data) {
  $("#ResultArea").html("");

  var table = $("<table class='table'></table>").appendTo("#ResultArea");

  var thead = $("<thead><tr><th>Name</th><th>Album</th><th>Artist</th></tr></thead>");
  table.append(thead);

  var tbody = $("<tbody></tbody>").appendTo(table);

  $.each(data, function (i, value) {
      var row = $("<tr></tr>").appendTo(tbody);
      $("<td></td>").text(value.Name).appendTo(row);
      $("<td></td>").text(value.Album).appendTo(row);
      $("<td></td>").text(value.Artist).appendTo(row);
  });
}

</script>
</html>
